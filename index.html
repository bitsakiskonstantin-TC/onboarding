    const DEFAULT_ACTIVITIES = [
      {
        id: 1,
        phase: 30,
        category: 'Introduktion & Kultur',
        activity: 'Välkomstfika & introduktion till teamet samt rundvandring på kontoret.',
        owner: 'Närmaste chef & HR',
        timePerWeek: '2-3 timmar',
        completed: false
      },
      {
        id: 2,
        phase: 30,

        activity: 'Djupdykning i produkten/tjänsten och dess värdeerbjudande tillsammans med Product Manager.',
        owner: 'Nyanställd',
        timePerWeek: '4-6 timmar',
        completed: false
      },
      {
        id: 3,
        phase: 30,
        category: 'Strategi & Kontext',
        activity: '1:1-möten med nyckelpersoner (Sales, Customer Success, Product och Ledningsgrupp) för att förstå utmaningar och mål.',
        owner: 'Nyanställd',
        timePerWeek: '8-10 timmar',
        completed: false
      },
      {
        id: 4,
        phase: 30,
        category: 'Verktyg & Data',
        activity: 'Teknisk inventering och genomgång av genomtänkt tech stack (t.ex. HubSpot, GA4, Semrush, Meta Ads Manager, Salesforce).',
        owner: 'Nyanställd',
        timePerWeek: '4-5 timmar',
        completed: false
      },
      {
        id: 5,
        phase: 30,
        category: 'Mötesstrukturer',
        activity: 'Etablera regelbundna veckovisa 1:1-möten med närmaste chef och veckomöten med marknadsteamet.',
        owner: 'Närmaste chef',
        timePerWeek: '2 timmar',
        completed: false
      },
      {
        id: 6,
        phase: 60,
        category: 'Strategi & Kontext',
        activity: 'Utvärdera nuvarande marknadsstrategi, målgruppsdefinitioner och konkurrentlandskap.',
        owner: 'Nyanställd',
        timePerWeek: '8-10 timmar',
        completed: false
      },
      {
        id: 7,
        phase: 60,
        category: 'Kanaler & Kampanjer',
        activity: 'Identifiera och exekvera en "Quick Win"-kampanj (t.ex. optimera sökord, justera annonsbudget eller re-engagera leads) för att testa processerna.',
        owner: 'Marknadsteamet',
        timePerWeek: '6-8 timmar',
        completed: false
      },
      {
        id: 8,
        phase: 60,
        category: 'Team & Resurser',
        activity: 'Göra en kompetenskartläggning av marknadsteamet samt stämma av eventuella behov av externa byråer eller frilansare.',
        owner: 'Nyanställd',
        timePerWeek: '4-5 timmar',
        completed: false
      },
      {
        id: 9,
        phase: 60,
        category: 'Ekonomi & Budget',
        activity: 'Genomgång av marknadsbudgeten och historisk avkastning (ROI/CAC/LTV) tillsammans med CFO/Chef.',
        owner: 'Nyanställd & Chef',
        timePerWeek: '3-4 timmar',
        completed: false
      },
      {
        id: 10,
        phase: 90,
        category: 'Strategi & Kontext',
        activity: 'Presentera en uppdaterad 6-månaders marknadsplan och föreslagna OKRs/KPIer för närmaste chef och ledningsgrupp.',
        owner: 'Nyanställd',
        timePerWeek: '10-12 timmar',
        completed: false
      },
      {
        id: 11,
        phase: 90,
        category: 'Kanaler & Kampanjer',
        activity: 'Lansera nästa stora integrerade marknadsaktivitet eller kampanj baserat på insikter från första 60 dagarna.',
        owner: 'Marknadsteamet',
        timePerWeek: '10-15 timmar',
        completed: false
      },
      {
        id: 12,
        phase: 90,
        category: 'Mötesstrukturer',
        activity: 'Utvärdera och sätta fasta rutiner för rapportering av marknadsdata och KPI:er till ledningsgruppen.',
        owner: 'Nyanställd',
        timePerWeek: '3-4 timmar',
        completed: false
      },
      {
        id: 13,
        phase: 90,
        category: 'Introduktion & Kultur',
        activity: 'Formell 90-dagars utvärdering och feedback-samtal: Hur känns rollen, teamet och målen framåt?',
        owner: 'Närmaste chef & HR',
        timePerWeek: '2 timmar',
        completed: false
      }
    ];

    function App() {
      const [inputs, setInputs] = useState({
        candidateName: 'Maria Andersson',
        role: 'Head of Marketing',
        startDate: '2026-06-29',
        manager: 'Henrik Lindqvist (CEO)',
        company: 'SveaTech Solutions',
        industry: 'SaaS / B2B Tech'
      });

      const [activities, setActivities] = useState(DEFAULT_ACTIVITIES);
      const [activeTab, setActiveTab] = useState('all');
      const [copied, setCopied] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [newActivity, setNewActivity] = useState({
        phase: 30,
        category: 'Strategi & Kontext',
        activity: '',
        owner: 'Nyanställd',
        timePerWeek: '2-4 timmar'
      });

      const [editFields, setEditFields] = useState({});

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setInputs(prev => ({ ...prev, [name]: value }));
      };

      const handleToggleComplete = (id) => {
        setActivities(prev => prev.map(act => 
          act.id === id ? { ...act, completed: !act.completed } : act
        ));
      };

      const handleAddActivity = (e) => {
        e.preventDefault();
        if (!newActivity.activity.trim()) return;

        const newId = activities.length > 0 ? Math.max(...activities.map(a => a.id)) + 1 : 1;
        setActivities(prev => [
          ...prev,
          {
            id: newId,
            ...newActivity,
            completed: false
          }
        ]);
        setNewActivity({
          phase: newActivity.phase,
          category: 'Strategi & Kontext',
          activity: '',
          owner: 'Nyanställd',
          timePerWeek: '2-4 timmar'
        });
      };

      const handleDeleteActivity = (id) => {
        setActivities(prev => prev.filter(act => act.id !== id));
      };

      const startEditing = (act) => {
        setEditingId(act.id);
        setEditFields({ ...act });
      };

      const saveEdit = () => {
        setActivities(prev => prev.map(act => 
          act.id === editingId ? { ...editFields } : act
        ));
        setEditingId(null);
      };

      const getProgress = (phase) => {
        const phaseActs = activities.filter(act => phase === 'all' ? true : act.phase === parseInt(phase));
        if (phaseActs.length === 0) return 0;
        const completed = phaseActs.filter(act => act.completed).length;
        return Math.round((completed / phaseActs.length) * 100);
      };

      const copyToClipboard = () => {
        let text = `==================================================\n`;
        text += `30/60/90-DAGARS ONBOARDINGPLAN FÖR NYANSTÄLLD\n`;
        text += `==================================================\n\n`;
        text += `Roll: ${inputs.role}\n`;
        text += `Namn: ${inputs.candidateName}\n`;
        text += `Startdatum: ${inputs.startDate}\n`;
        text += `Närmaste chef: ${inputs.manager}\n`;
        text += `Företag: ${inputs.company} (${inputs.industry})\n\n`;

        [30, 60, 90].forEach(phase => {
          text += `--------------------------------------------------\n`;
          text += `DAGAR 1-${phase} (${phase === 30 ? 'Lära & Absorbera' : phase === 60 ? 'Analysera & Planera' : 'Exekvera & Optimera'})\n`;
          text += `--------------------------------------------------\n`;
          
          const phaseActs = activities.filter(act => act.phase === phase);
          phaseActs.forEach((act, idx) => {
            text += `${idx + 1}. [${act.category}] ${act.activity}\n`;
            text += `   Ägare: ${act.owner} | Tidsåtgång: ${act.timePerWeek}/vecka\n\n`;
          });
        });

        text += `Genererad via HR-Onboardingverktyget den ${new Date().toLocaleDateString('sv-SE')}.`;

        navigator.clipboard.writeText(text);
        setCopied(true);
        setTimeout(() => setCopied(false), 3000);
      };

      return (
        <div>
          {/* Header Panel */}
          <header className="bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 text-white py-6 px-4 md:px-8 shadow-md no-print">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between gap-4">
              <div>
                <div className="flex items-center gap-2 mb-1">
                  <span className="bg-emerald-500 text-slate-900 font-semibold text-xs px-2.5 py-1 rounded-full uppercase tracking-wider">
                    HR Toolkit
                  </span>
                  <span className="text-slate-400 text-sm">| Onboarding</span>
                </div>
                <h1 className="text-2xl md:text-3xl font-extrabold tracking-tight">
                  30/60/90-Dagars Planerare
                </h1>
                <p className="text-slate-300 text-sm mt-1 max-w-2xl">
                  Skapa och skräddarsy en strukturerad introduktionsplan. Fyll i kandidatinfo till vänster så uppdateras planen i realtid. Redo att sparas som PDF eller kopieras.
                </p>
              </div>
              <div className="flex flex-wrap gap-2">
                <button 
                  onClick={copyToClipboard}
                  className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 active:scale-95 transition text-white px-4 py-2.5 rounded-lg text-sm font-medium border border-slate-700"
                >
                  {copied ? <CheckIcon className="w-4 h-4 text-emerald-400" /> : <CopyIcon className="w-4 h-4 text-slate-400" />}
                  {copied ? 'Kopierad till urklipp!' : 'Kopiera som text'}
                </button>
                <button 
                  onClick={() => window.print()}
                  className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 active:scale-95 transition text-white px-4 py-2.5 rounded-lg text-sm font-medium shadow-sm"
                >
                  <PrinterIcon className="w-4 h-4" />
                  Skriv ut / Spara PDF
                </button>
              </div>
            </div>
          </header>

          {/* Main Content Layout */}
          <main className="max-w-7xl mx-auto px-4 md:px-8 py-8 print-container">
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
              
              {/* Left Column: Form Controls (Hidden in Print) */}
              <div className="lg:col-span-4 space-y-6 no-print">
                
                {/* Metadata Input Card */}
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                  <div className="flex items-center gap-2 pb-4 mb-4 border-b border-slate-100">
                    <SettingsIcon className="w-5 h-5 text-indigo-600" />
                    <h2 className="font-bold text-slate-900 text-lg">Mottagare & Detaljer</h2>
                  </div>

                  <div className="space-y-4 text-sm">
                    <div>
                      <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">
                        Nyanställds namn
                      </label>
                      <div className="relative">
                        <span className="absolute left-3 top-3 text-slate-400">
                          <UserIcon className="w-4 h-4" />
                        </span>
                        <input 
                          type="text" 
                          name="candidateName"
                          value={inputs.candidateName}
                          onChange={handleInputChange}
                          className="w-full pl-9 pr-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                          placeholder="T.ex. Maria Andersson"
                        />
                      </div>
                    </div>

                    <div>
                      <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">
                        Roll/Titel
                      </label>
                      <div className="relative">
                        <span className="absolute left-3 top-3 text-slate-400">
                          <BriefcaseIcon className="w-4 h-4" />
                        </span>
                        <input 
                          type="text" 
                          name="role"
                          value={inputs.role}
                          onChange={handleInputChange}
                          className="w-full pl-9 pr-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                          placeholder="T.ex. Head of Marketing"
                        />
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">
                          Startdatum
                        </label>
                        <div className="relative">
                          <span className="absolute left-3 top-3 text-slate-400">
                            <CalendarIcon className="w-4 h-4" />
                          </span>
                          <input 
                            type="date" 
                            name="startDate"
                            value={inputs.startDate}
                            onChange={handleInputChange}
                            className="w-full pl-9 pr-2 py-2 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                          />
                        </div>
                      </div>

                      <div>
                        <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">
                          Närmaste chef
                        </label>
                        <input 
                          type="text" 
                          name="manager"
                          value={inputs.manager}
                          onChange={handleInputChange}
                          className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                          placeholder="Chefens namn"
                        />
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">
                          Företag
                        </label>
                        <input 
                          type="text" 
                          name="company"
                          value={inputs.company}
                          onChange={handleInputChange}
                          className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                          placeholder="Bolagsnamn"
                        />
                      </div>

                      <div>
                        <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">
                          Bransch/Fokus
                        </label>
                        <input 
                          type="text" 
                          name="industry"
                          value={inputs.industry}
                          onChange={handleInputChange}
                          className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                          placeholder="T.ex. SaaS / B2B Tech"

                {/* Add Custom Task Form */}
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">

                    <PlusIcon className="w-5 h-5 text-emerald-600" />
                    <h2 className="font-bold text-slate-900 text-lg">Skapa ny aktivitet</h2>
                  </div>

                  <form onSubmit={handleAddActivity} className="space-y-4 text-sm">
                    <div>
                      <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">
                        Fas / Period
                      </label>
                      <select 
                        value={newActivity.phase}
                        onChange={(e) => setNewActivity(prev => ({ ...prev, phase: parseInt(e.target.value) }))}
                        className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                      >
                        <option value={30}>Dag 1-30 (Lära & Absorbera)</option>
                        <option value={60}>Dag 31-60 (Analysera & Planera)</option>
                        <option value={90}>Dag 61-90 (Exekvera & Optimera)</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">
                        Kategori
                      </label>
                      <select 
                        value={newActivity.category}
                        onChange={(e) => setNewActivity(prev => ({ ...prev, category: e.target.value }))}
                        className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                      >
                        <option value="Introduktion & Kultur">Introduktion & Kultur</option>
                        <option value="Produkt & Tech">Produkt & Tech</option>
                        <option value="Strategi & Kontext">Strategi & Kontext</option>
                        <option value="Verktyg & Data">Verktyg & Data</option>
                        <option value="Kanaler & Kampanjer">Kanaler & Kampanjer</option>
                        <option value="Team & Resurser">Team & Resurser</option>
                        <option value="Ekonomi & Budget">Ekonomi & Budget</option>
                        <option value="Mötesstrukturer">Mötesstrukturer</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">
                        Aktivitetsbeskrivning
                      </label>
                      <textarea 
                        rows={3}
                        value={newActivity.activity}
                        onChange={(e) => setNewActivity(prev => ({ ...prev, activity: e.target.value }))}
                        className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="Beskriv konkret vad personen ska göra..."
                        required
                      />
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">
                          Ägare (Vem?)
                        </label>
                        <input 
                          type="text" 
                          value={newActivity.owner}
                          onChange={(e) => setNewActivity(prev => ({ ...prev, owner: e.target.value }))}
                          className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                          placeholder="T.ex. Nyanställd"
                        />
                      </div>

                      <div>
                        <label className="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">
                          Tidsåtgång / v
                        </label>
                        <input 
                          type="text" 
                          value={newActivity.timePerWeek}
                          onChange={(e) => setNewActivity(prev => ({ ...prev, timePerWeek: e.target.value }))}
                          className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                          placeholder="T.ex. 2-4 timmar"
                        />
                      </div>
                    </div>

                    <button 
                      type="submit"
                      className="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-2 rounded-lg transition active:scale-95 flex items-center justify-center gap-1"
                    >
                      <PlusIcon className="w-4 h-4" />
                      Lägg till i listan
                    </button>
                  </form>
                </div>

                {/* Quick Tips for Onboarding in Sweden */}
                <div className="bg-indigo-50 rounded-xl border border-indigo-100 p-5 text-indigo-950 text-xs space-y-3">
                  <div className="flex items-center gap-1.5 font-bold text-indigo-900 text-sm">
                    <AlertIcon className="w-4 h-4 text-indigo-700 shrink-0" />
                    <span>Tips för lyckad onboarding</span>
                  </div>
                  <ul className="list-disc pl-4 space-y-1.5 text-indigo-900/90">
                    <li><strong>Fika-faktor:</strong> Avsätt tid för ostrukturerade samtal. Det bygger psykologisk trygghet snabbare.</li>
                    <li><strong>Förväntningar:</strong> Tydliggör att de första 30 dagarna främst handlar om inlärning, inte direkta resultat.</li>
                    <li><strong>Hiring Manager-fokus:</strong> Dela denna plan direkt så chefen kan planera in sin kalender i förväg.</li>
                  </ul>
                </div>
              </div>

              {/* Right Column: Interactive Plan Output */}
              <div className="lg:col-span-8 space-y-6">
                
                {/* Live Document Header for PDF export */}
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 print-card relative overflow-hidden">
                  <div className="absolute top-0 left-0 right-0 h-1.5 bg-indigo-600"></div>
                  
                  <div className="flex justify-between items-start gap-4">
                    <div>
                      <span className="text-xs uppercase font-extrabold tracking-wider text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-md">
                        Introduktions- & Onboardingplan
                      </span>
                      <h2 className="text-2xl md:text-3xl font-black text-slate-900 mt-2">
                        {inputs.candidateName || 'N.N.'}
                      </h2>
                      <p className="text-slate-600 font-medium text-md">
                        {inputs.role || 'Rollen ej satt'} &bull; {inputs.company || 'Företaget'}
                      </p>
                    </div>
                    
                    <div className="text-right text-xs text-slate-500 space-y-1">
                      <div><strong>Startdatum:</strong> {inputs.startDate}</div>
                      <div><strong>Närmaste chef:</strong> {inputs.manager}</div>
                      <div><strong>Bransch:</strong> {inputs.industry}</div>
                    </div>
                  </div>

                  {/* Realtime progress tracker */}
                  <div className="mt-6 pt-4 border-t border-slate-100 no-print">
                    <div className="flex justify-between items-center mb-1.5 text-xs text-slate-500 font-bold">
                      <span>ONBOARDINGSTATUS (KLARMÄRKTA AKTIVITETER):</span>
                      <span className="text-indigo-600">{getProgress('all')}% KLART</span>
                    </div>
                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                      <div 
                        className="bg-indigo-600 h-full rounded-full transition-all duration-500 ease-out" 
                        style={{ width: `${getProgress('all')}%` }}
                      />
                    </div>
                  </div>
                </div>

                {/* Phase Tabs & Controls (Hidden in Print) */}
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 no-print">
                  <div className="bg-slate-200/60 p-1 rounded-xl flex gap-1 w-full sm:w-auto">
                    <button
                      onClick={() => setActiveTab('all')}
                      className={`flex-1 sm:flex-none px-4 py-2 rounded-lg text-xs font-semibold transition ${
                        activeTab === 'all' 
                          ? 'bg-white text-slate-900 shadow-sm' 
                          : 'text-slate-600 hover:text-slate-900'
                      }`}
                    >
                      Visa alla faser ({activities.length})
                    </button>
                    <button
                      onClick={() => setActiveTab('30')}
                      className={`flex-1 sm:flex-none px-4 py-2 rounded-lg text-xs font-semibold transition ${
                        activeTab === '30' 
                          ? 'bg-white text-indigo-700 shadow-sm' 
                          : 'text-slate-600 hover:text-slate-900'
                      }`}
                    >
                      Dag 1-30 ({activities.filter(a => a.phase === 30).length})
                    </button>
                    <button
                      onClick={() => setActiveTab('60')}
                      className={`flex-1 sm:flex-none px-4 py-2 rounded-lg text-xs font-semibold transition ${
                        activeTab === '60' 
                          ? 'bg-white text-indigo-700 shadow-sm' 
                          : 'text-slate-600 hover:text-slate-900'
                      }`}
                    >
                      Dag 31-60 ({activities.filter(a => a.phase === 60).length})
                    </button>
                    <button
                      onClick={() => setActiveTab('90')}
                      className={`flex-1 sm:flex-none px-4 py-2 rounded-lg text-xs font-semibold transition ${
                        activeTab === '90' 
                          ? 'bg-white text-indigo-700 shadow-sm' 
                          : 'text-slate-600 hover:text-slate-900'
                      }`}
                    >
                      Dag 61-90 ({activities.filter(a => a.phase === 90).length})
                    </button>
                  </div>

                  <div className="text-xs text-slate-500 italic px-1">
                    Tips: Klicka i rutan när uppgifter slutförts för att mäta framsteg!
                  </div>
                </div>

                {/* The Plan List Render */}
                <div className="space-y-8">
                  
                  {/* PHASE 30 Section */}
                  {(activeTab === 'all' || activeTab === '30') && (
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden print-card">
                      <div className="bg-slate-900 text-white px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                        <div>
                          <h3 className="font-extrabold text-base flex items-center gap-2">
                            <span className="bg-emerald-500 text-slate-950 font-bold px-2 py-0.5 rounded text-xs">FAS 1</span>
                            DAG 1-30: Lära & Absorbera
                          </h3>
                          <p className="text-xs text-slate-400 mt-1">
                            Fokus: Lära känna bolaget, teamet, produkten, teknologin samt nuläget.
                          </p>
                        </div>
                        <span className="text-xs font-bold text-emerald-400 no-print">
                          Fas-status: {getProgress(30)}% klar
                        </span>
                      </div>

                      <div className="divide-y divide-slate-100">
                        {activities.filter(act => act.phase === 30).length === 0 ? (
                          <div className="p-6 text-center text-slate-400 text-sm italic">
                            Inga uppgifter inlagda för denna fas.
                          </div>
                        ) : (
                          activities.filter(act => act.phase === 30).map(act => (
                            <ActivityItem 
                              key={act.id} 
                              act={act} 
                              editingId={editingId}
                              editFields={editFields}
                              setEditFields={setEditFields}
                              saveEdit={saveEdit}
                              startEditing={startEditing}
                              handleToggleComplete={handleToggleComplete}
                              handleDeleteActivity={handleDeleteActivity}
                            />
                          ))
                        )}
                      </div>
                    </div>
                  )}

                  {/* PHASE 60 Section */}
                  {(activeTab === 'all' || activeTab === '60') && (
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden print-card">
                      <div className="bg-slate-900 text-white px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                        <div>
                          <h3 className="font-extrabold text-base flex items-center gap-2">
                            <span className="bg-sky-500 text-slate-950 font-bold px-2 py-0.5 rounded text-xs">FAS 2</span>
                            DAG 31-60: Analysera & Planera
                          </h3>
                          <p className="text-xs text-slate-400 mt-1">
                            Fokus: Granska kanaler, identifiera lågt hängande frukter och påbörja optimering.
                          </p>
                        </div>
                        <span className="text-xs font-bold text-sky-400 no-print">
                          Fas-status: {getProgress(60)}% klar
                        </span>
                      </div>

                      <div className="divide-y divide-slate-100">
                        {activities.filter(act => act.phase === 60).length === 0 ? (
                          <div className="p-6 text-center text-slate-400 text-sm italic">
                            Inga uppgifter inlagda för denna fas.
                          </div>
                        ) : (
                          activities.filter(act => act.phase === 60).map(act => (
                            <ActivityItem 
                              key={act.id} 
                              act={act} 
                              editingId={editingId}
                              editFields={editFields}
                              setEditFields={setEditFields}
                              saveEdit={saveEdit}
                              startEditing={startEditing}
                              handleToggleComplete={handleToggleComplete}
                              handleDeleteActivity={handleDeleteActivity}
                            />
                          ))
                        )}
                      </div>
                    </div>
                  )}

                  {/* PHASE 90 Section */}
                  {(activeTab === 'all' || activeTab === '90') && (
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden print-card">
                      <div className="bg-slate-900 text-white px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                        <div>
                          <h3 className="font-extrabold text-base flex items-center gap-2">
                            <span className="bg-indigo-500 text-slate-950 font-bold px-2 py-0.5 rounded text-xs">FAS 3</span>
                            DAG 61-90: Exekvera & Optimera
                          </h3>
                          <p className="text-xs text-slate-400 mt-1">
                            Fokus: Sätta strategiska mål (OKRs), fullt ägarskap över budget och lansera större kampanjer.
                          </p>
                        </div>
                        <span className="text-xs font-bold text-indigo-400 no-print">
                          Fas-status: {getProgress(90)}% klar
                        </span>
                      </div>

                      <div className="divide-y divide-slate-100">
                        {activities.filter(act => act.phase === 90).length === 0 ? (
                          <div className="p-6 text-center text-slate-400 text-sm italic">
                            Inga uppgifter inlagda för denna fas.
                          </div>
                        ) : (
                          activities.filter(act => act.phase === 90).map(act => (
                            <ActivityItem 
                              key={act.id} 
                              act={act} 
                              editingId={editingId}
                              editFields={editFields}
                              setEditFields={setEditFields}
                              saveEdit={saveEdit}
                              startEditing={startEditing}
                              handleToggleComplete={handleToggleComplete}
                              handleDeleteActivity={handleDeleteActivity}
                            />
                          ))
                        )}
                      </div>
                    </div>
                  )}

                </div>

                {/* Bottom Help block (Hidden in Print) */}
                <div className="bg-slate-100 rounded-xl p-6 text-slate-600 text-xs text-center space-y-1 no-print">
                  <p>
                    <strong>Hittat fel eller vill återställa mallen?</strong> Du kan enkelt uppdatera beskrivningarna direkt via redigeringsknappen bredvid varje punkt.
                  </p>
                  <p>
                    När du klickar på <strong>"Skriv ut / Spara PDF"</strong> döljs alla redigeringsfält och form-kontroller automatiskt så att endast en klinisk och professionell rapport sparas.
                  </p>
                </div>

              </div>
            </div>
          </main>
        </div>
      );
    }

    // Activity Item Sub-Component
    function ActivityItem({ 
      act, 
      editingId, 
      editFields, 
      setEditFields, 
      saveEdit, 
      startEditing, 
      handleToggleComplete, 
      handleDeleteActivity 
    }) {
      const isEditing = editingId === act.id;

      return (
        <div className={`p-5 transition hover:bg-slate-50/75 flex items-start gap-4 ${act.completed ? 'bg-slate-50/50' : ''}`}>
          
          {/* Complete Checkbox */}
          <button 
            onClick={() => handleToggleComplete(act.id)}
            className={`mt-1 flex items-center justify-center w-5 h-5 rounded border-2 transition no-print ${
              act.completed 
                ? 'bg-emerald-600 border-emerald-600 text-white' 
                : 'border-slate-300 hover:border-indigo-500'
            }`}
          >
            {act.completed && <CheckIcon className="w-3.5 h-3.5 stroke-[3]" />}
          </button>

          {/* Main Content Area */}
          <div className="flex-1 space-y-2">
            
            {isEditing ? (
              <div className="space-y-3 no-print">
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                  <div>
                    <label className="text-xs text-slate-400">Kategori</label>
                    <input 
                      type="text"
                      value={editFields.category}
                      onChange={(e) => setEditFields({ ...editFields, category: e.target.value })}
                      className="w-full text-xs px-2 py-1 border rounded"
                    />
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-xs text-slate-400">Ägare</label>
                      <input 
                        type="text"
                        value={editFields.owner}
                        onChange={(e) => setEditFields({ ...editFields, owner: e.target.value })}
                        className="w-full text-xs px-2 py-1 border rounded"
                      />
                    </div>
                    <div>
                      <label className="text-xs text-slate-400">Tid / vecka</label>
                      <input 
                        type="text"
                        value={editFields.timePerWeek}
                        onChange={(e) => setEditFields({ ...editFields, timePerWeek: e.target.value })}
                        className="w-full text-xs px-2 py-1 border rounded"
                      />
                    </div>
                  </div>
                </div>
                <div>
                  <label className="text-xs text-slate-400">Aktivitet</label>
                  <textarea 
                    value={editFields.activity}
                    onChange={(e) => setEditFields({ ...editFields, activity: e.target.value })}
                    className="w-full text-xs px-2 py-1 border rounded"
                    rows={2}
                  />
                </div>
                <div className="flex gap-2 justify-end">
                  <button 
                    onClick={saveEdit}
                    className="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-semibold px-3 py-1 rounded shadow-sm"
                  >
                    Spara
                  </button>
                </div>
              </div>
            ) : (
              <div>
                <div className="flex flex-wrap items-center gap-2">
                  <span className="text-xs font-bold text-slate-500 uppercase tracking-wider bg-slate-100 px-2 py-0.5 rounded">
                    {act.category}
                  </span>
                  
                  {/* Desktop Status Indicators */}
                  <div className="flex items-center gap-3 text-xs text-slate-400 ml-auto print:ml-0">
                    <span className="flex items-center gap-1">
                      <UsersIcon className="w-3.5 h-3.5 text-slate-400" />
                      Ägare: <strong className="text-slate-600">{act.owner}</strong>
                    </span>
                    <span className="flex items-center gap-1">
                      <ClockIcon className="w-3.5 h-3.5 text-slate-400" />
                      Mål-tid: <strong className="text-slate-600">{act.timePerWeek}</strong>
                    </span>
                  </div>
                </div>

                <p className={`text-slate-700 text-sm mt-2 font-medium ${act.completed ? 'line-through text-slate-400' : ''}`}>
                  {act.activity}
                </p>
              </div>
            )}

          </div>

          {/* Right Actions: Edit & Delete (Hidden in Print) */}
          {!isEditing && (
            <div className="flex gap-1.5 no-print">
              <button 
                onClick={() => startEditing(act)}
                className="p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-slate-100 rounded transition"
                title="Redigera aktivitet"
              >
                <EditIcon className="w-4 h-4" />
              </button>
              <button 
                onClick={() => handleDeleteActivity(act.id)}
                className="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded transition"
                title="Ta bort aktivitet"
              >
                <TrashIcon className="w-4 h-4" />
              </button>
            </div>
          )}

        </div>
      );
    }

    // Render App with safety initialization check
    const initApp = () => {
      const rootEl = document.getElementById('root');
      if (rootEl) {
        const root = ReactDOM.createRoot(rootEl);
        root.render(<App />);
      }
    };

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  </script>
</body>
</html>
